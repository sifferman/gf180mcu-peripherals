# Use the slang frontend. Required here: yosys's default Verilog frontend is
# pathologically slow deriving verilog-ethernet's parameterized CRC `lfsr`
# (constexpr lfsr_mask, >60s PER instance, regardless of LOOP/REDUCTION style),
# which stalls JsonHeader/Synthesis indefinitely. slang elaborates the whole
# design in ~20s.
USE_SLANG: True
# Two slang options:
#   --ignore-unknown-modules : IO pad / SRAM / wafer-IP cells are physical macros
#     (blackboxes from lib/lef), not in VERILOG_FILES; treat unknown instances as
#     blackboxes.
#   --max-constexpr-steps    : yosys-slang reuses one slang EvalContext for the whole
#     design, so slang's per-evaluation `steps` counter ACCUMULATES across every
#     constexpr (notably verilog-ethernet's CRC `lfsr_mask`, evaluated once per output
#     bit per instance). Once the running total passes the 1,000,000 default, slang
#     crashes (asserts on an empty SourceLocation) instead of erroring cleanly. Raising
#     the ceiling lets the *real* CRC hash elaborate — no RTL workaround, submodule stays
#     pristine. STILL REQUIRED even with the bumped yosys-slang (flake pins povik master):
#     its static-select fast-paths cut per-eval cost, but the full chip_top accumulates
#     enough constexpr work across the whole eth+sdram stack to still exceed the default
#     without this flag (verified — it crashes). The proper fix is the per-evaluation
#     step-counter reset on sifferman/yosys-slang@fix-evalcontext-step-accumulation, which
#     removes the need for this flag once merged upstream. (Root-caused in questions.md.)
SLANG_ARGUMENTS: ['--ignore-unknown-modules', '--max-constexpr-steps', '1000000000']
# The verilog-ethernet stack trips yosys's synth check with benign warnings that are
# FPGA-proven and pass RTL sim: ~192 "no driver" on unused PTP timestamp ports
# (rx/tx_ptp_ts; PTP disabled) and ~86 yosys false-positive "multiple drivers" on the
# async-FIFO gray2bin combinational function. Don't fail the flow on them (correctness
# gates here are RTL sim + LVS). Re-review when adding new RTL.
ERROR_ON_SYNTH_CHECKS: false

# Slightly smaller file sizes
PRIMARY_GDSII_STREAMOUT_TOOL: klayout

# SDC files
PNR_SDC_FILE: dir::chip_top.sdc
SIGNOFF_SDC_FILE: dir::chip_top.sdc
FALLBACK_SDC: dir::chip_top.sdc

# Power / ground nets
VDD_NETS:
- VDD
GND_NETS:
- VSS

# We need to add gf180mcu_fd_io__bi_24t
# due to the unused Y output for output only pads
IGNORE_DISCONNECTED_MODULES:
- gf180mcu_fd_io__bi_24t
- gf180mcu_ws_ip__qrcode_id
- gf180mcu_ws_ip__shuttle_id
- gf180mcu_ws_ip__project_id
- gf180mcu_ws_ip__logo
- gf180mcu_ws_ip__marker

# Clock
CLOCK_PORT: clk_PAD
CLOCK_NET: clk_pad/Y
CLOCK_PERIOD: 40 # 25 MHz

# CTS sink clustering. The 12-PLL array adds thousands of reference-domain flops, so the core
# clock tree is large; OpenROAD's default sink clustering (~20 sinks per leaf buffer) drives each
# clkbuf_leaf well past the tight MAX_FANOUT_CONSTRAINT of 9, which flagged ~2000 benign clock-tree
# leaf max-fanout warnings (the data enable/reset nets meet 9 — repair_design buffers them). Cap
# the leaf cluster at 8 sinks so the clock tree honours the same fanout budget as the data nets
# (more, smaller clock buffers; the die has room at ~51% utilization).
CTS_SINK_CLUSTERING_SIZE: 8

# Overfix hold violations
PL_RESIZER_HOLD_SLACK_MARGIN: 0.35
GRT_RESIZER_HOLD_SLACK_MARGIN: 0.3

# Increase density for more 
# logic on your die
PL_TARGET_DENSITY_PCT: 35
GRT_ALLOW_CONGESTION: true

# Allow a larger Y displacement
PL_MAX_DISPLACEMENT_Y: 200

# Fix antenna violations after DRT
DRT_ANTENNA_REPAIR_ITERS: 10
DRT_ANTENNA_REPAIR_MARGIN: 10 # %

# PDN
PDN_CFG: dir::pdn/pdn_cfg.tcl
PDN_ENABLE_PINS: False

# PDN - Straps
PDN_VWIDTH: 5
PDN_HWIDTH: 5
PDN_VSPACING: 1
PDN_HSPACING: 1
PDN_VPITCH: 75
PDN_HPITCH: 75

# PDN - Core ring
PDN_CORE_RING: True
# Maximum metal width without slotting: 30um
PDN_CORE_RING_VWIDTH: 25
PDN_CORE_RING_HWIDTH: 25
PDN_CORE_RING_CONNECT_TO_PADS: True
PDN_CORE_VERTICAL_LAYER: Metal4
PDN_CORE_HORIZONTAL_LAYER: Metal3
PDN_CORE_RING_CONNECT_TO_PAD_LAYERS: [Metal2]

# Do not error on magic DRC violations
# Note: Passing magic DRC is not required for the submission.
# However, it is recommended to fix or carefully review all violations.
ERROR_ON_MAGIC_DRC: False

# Prevent false positive DRC errors in I/O cells
MAGIC_GDS_FLATGLOB:
# For contacts
- "*_CDNS_*"
# Foundry provided SRAMs
- "*$$*"
- "M1_N*"
- "M1_P*"
- "M2_M1*"
- "M3_M2*"
- "nmos_5p0*"
- "nmos_1p2*"
- "pmos_5p0*"
- "pmos_1p2*"
- "via1_*"
- "ypass_gate*"
- "G_ring_*"
# These additional cells must be flattened to get rid of 3.3V devices
# (DUALGATE drawn into high-level cells)
- "dcap_103*"
- "din_*"
- "mux821_*"
- "rdummy_*"
- "pmoscap_*"
- "xdec_*"
- "ypredec*"
- "xpredec*"
- "prexdec_*"
- "xdec8_*"
- "xdec16_*"
- "xdec32_*"
- "sa_*"

# Since we cannot meet the minimum density limit on Metal2,
# ignore active metal on previous and subsequent layers
# (DM.5_DM.7 and DM.4_DM.6). Dummy metal is moved to active
# metal during the precheck.
KLAYOUT_FILLER_OPTIONS:
  Metal2_ignore_active: true

# Because we have multiple power pads for one power domain
MAGIC_EXT_UNIQUE: notopports

# Image render settings
KLAYOUT_RENDER_RESOLUTION: 2048
KLAYOUT_RENDER_OVERSAMPLING: 3
KLAYOUT_PROPERTIES: dir::gf180mcu_render.lyp

# DRC settings
# A high number of workers increases RAM usage,
# but can significantly improve the performance.
# workers * threads should equal the available
# hardware threads for a best possible utilization.

KLAYOUT_DRC_THREADS: 1

# "max" equals max hardware threads
KLAYOUT_DRC_OPTIONS:
  decks: "all,-antenna,-density,-cup" # disable CUP for now
  variant: ref::$PDK
  workers: max

KLAYOUT_DENSITY_OPTIONS:
  decks: "density"
  variant: ref::$PDK
  workers: max

KLAYOUT_ANTENNA_OPTIONS:
  decks: "antenna"
  variant: ref::$PDK
  workers: max
