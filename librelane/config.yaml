# Use the slang frontend. Required here: yosys's default Verilog frontend is
# pathologically slow deriving verilog-ethernet's parameterized CRC `lfsr`
# (constexpr lfsr_mask, >60s PER instance, regardless of LOOP/REDUCTION style),
# which stalls JsonHeader/Synthesis indefinitely. slang elaborates the whole
# design in ~20s.
USE_SLANG: True
# Two slang options:
#   --ignore-unknown-modules : IO pad / SRAM / wafer-IP cells are physical macros
#     (blackboxes from lib/lef), not in VERILOG_FILES; treat unknown instances as
#     blackboxes.
#   --max-constexpr-steps    : yosys-slang reuses one slang EvalContext for the whole
#     design, so slang's per-evaluation `steps` counter ACCUMULATES across every
#     constexpr (notably verilog-ethernet's CRC `lfsr_mask`, evaluated once per output
#     bit per instance). Once the running total passes the 1,000,000 default, slang
#     crashes (asserts on an empty SourceLocation) instead of erroring cleanly. Raising
#     the ceiling lets the *real* CRC hash elaborate — no RTL workaround, submodule stays
#     pristine. STILL REQUIRED even with the bumped yosys-slang (flake pins povik master):
#     its static-select fast-paths cut per-eval cost, but the full chip_top accumulates
#     enough constexpr work across the whole eth+sdram stack to still exceed the default
#     without this flag (verified — it crashes). The proper fix is the per-evaluation
#     step-counter reset on sifferman/yosys-slang@fix-evalcontext-step-accumulation, which
#     removes the need for this flag once merged upstream. (Root-caused in questions.md.)
SLANG_ARGUMENTS: ['--ignore-unknown-modules', '--max-constexpr-steps', '1000000000']
# The verilog-ethernet stack trips yosys's synth check with benign warnings that are
# FPGA-proven and pass RTL sim: ~192 "no driver" on unused PTP timestamp ports
# (rx/tx_ptp_ts; PTP disabled) and ~86 yosys false-positive "multiple drivers" on the
# async-FIFO gray2bin combinational function. Don't fail the flow on them (correctness
# gates here are RTL sim + LVS). Re-review when adding new RTL.
ERROR_ON_SYNTH_CHECKS: false

# Slightly smaller file sizes
PRIMARY_GDSII_STREAMOUT_TOOL: klayout

