# --- LVS: ignore fill / tap / decap cells (Netgen hang fix) ---
# The 3v3 SCL (gf180mcu_as_sc_mcu7t3v3) + ocd_io flow inserts ~482k fill/tap/decap cells
# (fill_1 113k, tap_2 86k, fillcap_4/8/16 ~200k). At that scale Netgen's partition refinement
# does not converge -- LVS spun for 14+ h. These cells connect only to VDD/VSS rails, so dropping
# them from the comparison does not reduce LVS coverage. LibreLane feeds this list to Netgen's
# `ignore class` directive. Verified on the routed netlist: device count 445k -> 275k and Netgen
# reports "Circuits match uniquely" in minutes. (Pattern from gf180mcu-project-template 3v3 branch.)
LVS_IGNORE_CELLS:
- gf180mcu_as_sc_mcu7t3v3__fill_1
- gf180mcu_as_sc_mcu7t3v3__fill_2
- gf180mcu_as_sc_mcu7t3v3__fill_4
- gf180mcu_as_sc_mcu7t3v3__fill_8
- gf180mcu_as_sc_mcu7t3v3__fillcap_4
- gf180mcu_as_sc_mcu7t3v3__fillcap_8
- gf180mcu_as_sc_mcu7t3v3__fillcap_16
- gf180mcu_as_sc_mcu7t3v3__tap_2
- gf180mcu_ocd_io__fill1
- gf180mcu_ocd_io__fill5
- gf180mcu_ocd_io__fill10
- gf180mcu_ocd_io__fillnc

# Clock
CLOCK_PORT: clk_PAD
CLOCK_NET: clk_pad/Y
CLOCK_PERIOD: 20 # 50 MHz (experiment; was 40 = 25 MHz)

# --- Delay-driven synthesis (attack ADPLL loop-filter logic DEPTH, not via multicycle) ---
# The residual SS setup violator is the ADPLL PI loop-filter accumulator: a wide add/multiply that
# the default "AREA 0" strategy (abc `amap`) maps as a ~40-level RIPPLE-CARRY chain (~18 ns of pure
# cell delay -> fails the 20 ns period at the 125C/3v00 corner). This is a logic-DEPTH problem, not
# placement or constraints: SDC cannot add cycle budget, and the path is NOT cleanly multicycle (the
# freq-detector window is runtime-programmable to 1), so we do NOT false-path/multicycle it. Instead
# flip abc to a DELAY strategy: `&dch` (don't-care logic restructuring) + `&nf` (delay-driven mapper)
# + `retime` re-map the SAME RTL into a shallow parallel-prefix-style adder (~log2 depth), shrinking
# the loop's combinational delay directly. RESYNTH does a second timing-driven restructuring pass in
# PnR on whatever critical paths remain. No RTL change, no constraint relabeling.
SYNTH_STRATEGY: "DELAY 0"

# ADPLL ring-DCO nets: keep the resizer's hands off the oscillator. Resizer::dontTouch(net) only
# returns true when the NET itself is do-not-touch -- the (* dont_touch *) on the inv/mux CELLS does
# NOT propagate to the nets between them (OpenROAD rsz/Resizer.cc), so without this repair_design can
# splice a buffer into the ring and change/ruin the oscillation. This regex marks every ring net
# (861 of them, verified on the routed netlist) do-not-touch so no buffer is inserted between the
# dont_touch inverters. (Forced *adjacency* of the inverters is a separate concern -- OpenROAD honors
# dbGroup placement fences but LibreLane exposes no knob for it; the robust answer is hardening each
# DCO as a macro. Here, connectivity-driven global placement keeps the chain compact enough.)
#
# DISABLED ("^$" = match nothing): net-level dont_touch on the oscillator nets makes repair_design
# ERROR (RSZ-3006 "Failed to insert buffer ... is dont_touch") -- the ring/TDC OUTPUT node is high
# fanout (feedback + TDC dco_clk_i + freq counter) and legitimately needs buffering for max-cap/
# transition, which dont_touch forbids. The cells stay protected by the RTL (* dont_touch *) (not
# resized/removed) and the SDC false-paths keep these chains out of timing; repair_design is allowed
# to buffer the high-fanout distribution net. To get a TRULY buffer-free oscillator loop (so the
# inverter-to-inverter nets can be dont_touch without the RSZ-3006), the right fix is an RTL change:
# add a (* dont_touch *) output buffer in ring_dco/adpll_tdc_flash that decouples the low-fanout
# feedback loop from the bufferable distribution output. Tracked as follow-up.
RSZ_DONT_TOUCH_RX: "^$"

# CTS sink clustering. The 12-PLL array adds thousands of reference-domain flops, so the core
# clock tree is large; OpenROAD's default sink clustering (~20 sinks per leaf buffer) drives each
# clkbuf_leaf well past the tight MAX_FANOUT_CONSTRAINT of 9, which flagged ~2000 benign clock-tree
# leaf max-fanout warnings (the data enable/reset nets meet 9 — repair_design buffers them). Cap
# the leaf cluster at 8 sinks so the clock tree honours the same fanout budget as the data nets
# (more, smaller clock buffers; the die has room at ~51% utilization).
CTS_SINK_CLUSTERING_SIZE: 8

# Overfix hold violations
PL_RESIZER_HOLD_SLACK_MARGIN: 0.35
GRT_RESIZER_HOLD_SLACK_MARGIN: 0.3

# Increase density for more 
# logic on your die
PL_TARGET_DENSITY_PCT: 35
GRT_ALLOW_CONGESTION: true

# Allow a larger Y displacement
PL_MAX_DISPLACEMENT_Y: 200

# Antenna handling. The GRT-based OpenROAD.RepairAntennas (pre-route diode insertion) deterministically
# hits an OpenROAD global-router bug on this netlist -- "[GRT-0183] Net _001309_: heap underflow during
# 3D maze routing" -- so disable it and instead mitigate antennas with (a) the non-GRT heuristic diode
# insertion (Odb.HeuristicDiodeInsertion: pre-insert a diode on any net longer than the threshold) and
# (b) the detailed router's own antenna repair pass (DRT, below). The final magic/klayout antenna check
# still validates the result. (RepairAntennas was only triggered for routes the DRT pass already covers.)
RUN_ANTENNA_REPAIR: false
RUN_HEURISTIC_DIODE_INSERTION: true
HEURISTIC_ANTENNA_THRESHOLD: 90  # µm: insert a protective diode on nets longer than this
# Fix antenna violations after DRT
DRT_ANTENNA_REPAIR_ITERS: 10
DRT_ANTENNA_REPAIR_MARGIN: 10 # %

# PDN
PDN_CFG: dir::pdn/pdn_cfg.tcl
PDN_ENABLE_PINS: False

# PDN - Straps
PDN_VWIDTH: 5
PDN_HWIDTH: 5
PDN_VSPACING: 1
PDN_HSPACING: 1
PDN_VPITCH: 75
PDN_HPITCH: 75

# PDN - Core ring
PDN_CORE_RING: True
# Maximum metal width without slotting: 30um
PDN_CORE_RING_VWIDTH: 25
PDN_CORE_RING_HWIDTH: 25
PDN_CORE_RING_CONNECT_TO_PADS: True
PDN_CORE_VERTICAL_LAYER: Metal4
PDN_CORE_HORIZONTAL_LAYER: Metal3
PDN_CORE_RING_CONNECT_TO_PAD_LAYERS: [Metal2]

# Do not error on magic DRC violations
# Note: Passing magic DRC is not required for the submission.
# However, it is recommended to fix or carefully review all violations.
ERROR_ON_MAGIC_DRC: False

# Prevent false positive DRC errors in I/O cells
MAGIC_GDS_FLATGLOB:
# For contacts
- "*_CDNS_*"
# Foundry provided SRAMs
- "*$$*"
- "M1_N*"
- "M1_P*"
- "M2_M1*"
- "M3_M2*"
- "nmos_5p0*"
- "nmos_1p2*"
- "pmos_5p0*"
- "pmos_1p2*"
- "via1_*"
- "ypass_gate*"
- "G_ring_*"
# These additional cells must be flattened to get rid of 3.3V devices
# (DUALGATE drawn into high-level cells)
- "dcap_103*"
- "din_*"
- "mux821_*"
- "rdummy_*"
- "pmoscap_*"
- "xdec_*"
- "ypredec*"
- "xpredec*"
- "prexdec_*"
- "xdec8_*"
- "xdec16_*"
- "xdec32_*"
- "sa_*"

# Since we cannot meet the minimum density limit on Metal2,
# ignore active metal on previous and subsequent layers
# (DM.5_DM.7 and DM.4_DM.6). Dummy metal is moved to active
# metal during the precheck.
KLAYOUT_FILLER_OPTIONS:
  Metal2_ignore_active: true

# Because we have multiple power pads for one power domain
MAGIC_EXT_UNIQUE: notopports

# Image render settings
KLAYOUT_RENDER_RESOLUTION: 2048
KLAYOUT_RENDER_OVERSAMPLING: 3
KLAYOUT_PROPERTIES: dir::gf180mcu_render.lyp

# DRC settings
# A high number of workers increases RAM usage,
# but can significantly improve the performance.
# workers * threads should equal the available
# hardware threads for a best possible utilization.

KLAYOUT_DRC_THREADS: 1

# "max" equals max hardware threads
KLAYOUT_DRC_OPTIONS:
  decks: "all,-antenna,-density,-cup" # disable CUP for now
  variant: ref::$PDK
  workers: max

KLAYOUT_DENSITY_OPTIONS:
  decks: "density"
  variant: ref::$PDK
  workers: max

KLAYOUT_ANTENNA_OPTIONS:
  decks: "antenna"
  variant: ref::$PDK
  workers: max
